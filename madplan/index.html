<script>
(async function(){

    var html=await res.text();

exOf(i.category||'andet')),i.qty,i.on!==false]);return {v:4,d:days,m:meatDays,p:plan,x:excluded,r:chosen,mi:manual,w:activeWeek}}"],["async function shareWeek(){saveSession();let link=location.origin+location.pathname+'#uge='+enc(stateObj());try{if(navigator.share){await navigator.share({title:'Madplan',text:'Her er ugens madplan',url:link});return}await navigator.clipboard.writeText(link);alert('Del uge-linket er kopieret. Send det til hende.')}catch(e){prompt('Kopiér Del uge-linket:',link)}}","async function shareWeek(){saveSession();let longLink=location.origin+location.pathname+'#uge='+enc(stateObj());let link=longLink;try{let r=await fetch('https://tinyurl.com/api-create.php?url='+encodeURIComponent(longLink));let t=(await r.text()).trim();if(r.ok&&/^https?:\\/\\//.test(t))link=t}catch(e){}let msg='Her er ugens madplan:\\n'+link;try{if(navigator.share){await navigator.share({title:'Madplan',text:msg});return}await navigator.clipboard.writeText(msg);alert('Madplan-linket er kopieret. Send det til hende.')}catch(e){prompt('Kopiér Madplan-linket:',msg)}}"],["const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};","const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};function isoWeek(d=new Date()){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));let day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);let y=d.getUTCFullYear(),start=new Date(Date.UTC(y,0,1));let w=Math.ceil((((d-start)/86400000)+1)/7);return {y,w}}function newWeekMeta(){let w=isoWeek();return {id:'uge-'+w.y+'-'+String(w.w).padStart(2,'0')+'-'+id(),label:'Uge '+w.w,updatedAt:new Date().toISOString()}}let activeWeek=store.get('madplan_week_meta_v1',null)||newWeekMeta();function touchWeek(){activeWeek.updatedAt=new Date().toISOString();store.set('madplan_week_meta_v1',activeWeek)}function timeOnly(x){try{return on add(name,cat,qty=1,source='ret'){name=cleanName(name);cat=cat||'andet';let key=source+'|'+cat+'|'+name.toLowerCase();if(!m[key])m[key]={id:id(),name,category:cat,qty:0,on:true,source};m[key].qty+=qty}plan.map(byId).forEach((r,di)=>(r.ingredients||[]).forEach(i=>{if(ingOn(di,i))add(i.name,i.category,1,'ret')}));STANDARD.forEach(i=>add(i.name,i.category,i.qty,'standard'));manual.forEach(i=>{let key='manuelt|'+i.category+'|'+i.name.toLowerCase();if(!m[key])m[key]=i;else m[key].qty+=i.qty});shopping=Object.values(m).sort((a,b)=>CATS.indexOf(a.category)-CATS.indexOf(b.category)||a.source.localeCompare(b.source,'da')||a.name.localeCompare(b.name,'da'))}"],["function addItem(cat,name){name=cleanName(name);let found=shopping.find(i=>i.category===cat&&i.name.toLowerCase()===name.toLowerCase());if(found){found.qty++;found.on=true}else shopping.push({id:id(),name,category:cat,qty:1,on:true,source:'ekstra'});saveSession();renderList();renderPrint()}","function addItem(cat,name){name=cleanName(name);let found=shopping.find(i=>i.category===cat&&i.name.toLowerCase()===name.toLowerCase()&&(i.source==='manuelt'||i.source==='ekstra'));if(found){found.qty++;found.on=true;found.source='manuelt'}else shopping.push({id:id(),name,category:cat,qty:1,on:true,source:'manuelt'});saveSession();renderList();renderPrint()}"],["function itemRow(i){return `<div class=\"item\"><button class=\"check ${i.on?'on':''}\" data-toggle=\"${i.id}\">${i.on?'✓':''}</button><div><b>${esc(i.name)}</b><div class=\"sub\" style=\"margin:2px 0 0\">${esc(i.source)}</div></div><div class=\"qty\"><button data-minus=\"${i.id}\">−</button><span>${i.qty}</span><button data-plus=\"${i.id}\">+</button></div></div>`}","function itemRow(i){return `<div class=\"item\"><button class=\"check ${i.on?'on':''}\" data-toggle=\"${i.id}\">${i.on?'✓':''}</button><div><b>${esc(i.name)}</b><div class=\"sub\" style=\"margin:2px 0 0\">${esc(sourceLabel(i.source))}</div></div><div class=\"qty\"><button data-minus=\"${i.id}\">−</button><span>${i.qty}</span><button data-plus=\"${i.id}\">+</button></div></div>`}"],["data-tab=\"print\">PDF</button>","data-tab=\"print\">Overblik</button>"],["el.innerHTML=`<div class=\"card\"><h2>Ugens madplan","el.innerHTML=`${weekTop()}<div class=\"card\"><h2>Ugens madplan"],["onclick=\"buildShopping();saveSession();renderAll()\">Nulstil listen","onclick=\"buildShopping({keepManual:false});saveSession();renderAll()\">Nulstil indkøbsliste"],["onclick=\"setTab('print')\">Vis/PDF →","onclick=\"setTab('print')\">Overblik →"],["<h2>Visning og PDF</h2><p class=\"sub\">Download PDF, åbn PDF eller del den aktuelle uge som link.</p>","<h2>Overblik</h2><p class=\"sub\">Valgte retter, indkøbsliste, deling og PDF.</p>"],["buildShopping();if(pendingShopping){shopping=pendingShopping.map(i=>({id:id(),name:cleanName(i.name),category:i.category,qty:Number(i.qty)||1,on:i.on!==false,source:i.source||'delt'}));pendingShopping=null}saveSession(false);renderAll()}","if(pendingShopping){shopping=pendingShopping.map(i=>({id:id(),name:cleanName(i.name),category:i.category,qty:Number(i.qty)||1,on:i.on!==false,source:i.source==='ekstra'?'manuelt':(i.source||'manuelt')}));pendingShopping=null;buildShopping()}else buildShopping();saveSession(false);renderAll()}"]];
    patches.forEach(function(p){html=html.replace(p[0],p[1]);});
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML='<div class="card"><h1>Madplan kunne ikke åbnes</h1><p>Prøv at genindlæse siden.</p><p class="muted">Fejl: '+String(e.message||e)+'</p></div>';
