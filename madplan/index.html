<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Madplan">
<title>Madplan</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#F7F5F2;color:#1f1f1f;min-height:100vh;display:grid;place-items:center;margin:0;padding:24px}.card{max-width:560px;background:#fff;border:1px solid #E7E2DC;border-radius:22px;padding:24px;box-shadow:0 16px 40px rgba(41,24,18,.07)}a{color:#800020;font-weight:700}.muted{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="card">
<h1>Madplan åbner…</h1>
<p class="muted">Hvis appen ikke åbner automatisk, så genindlæs siden.</p>
</div>
<script>
(async function(){
  var src='https://raw.githubusercontent.com/MGforever26/madplan/main/index.html';
  try{
    var res=await fetch(src,{cache:'no-store'});
    if(!res.ok) throw new Error('Kunne ikke hente appen');
    var html=await res.text();
    var oldApply="function applyState(d){weekRecipes=(d.recipes||[]).map(normalizeRecipe);mergeRecipes(weekRecipes);days=Number(d.days)||4;meatDays=Number(d.meatDays??1);excluded=d.excluded||{};plan=(d.plan||[]).filter(x=>recipes.some(r=>r.id===x));pendingShopping=Array.isArray(d.shopping)?d.shopping.map(i=>({id:id(),name:cleanName(i.name),category:String(i.category||'andet'),qty:Number(i.qty)||1,on:i.on!==false,source:i.source||'delt'})).filter(i=>i.name):null}";
    var newApply="function applyState(d){if(d&&d.v===3){d={v:2,days:d.d,meatDays:d.m,plan:d.p,excluded:d.x,recipes:(d.r||[]).map(r=>({id:r[0],name:r[1],type:r[2],ingredients:(r[3]||[]).map(i=>({name:i[0],category:CATS[i[1]]||'andet'}))})),shopping:null}}weekRecipes=(d.recipes||[]).map(normalizeRecipe);mergeRecipes(weekRecipes);days=Number(d.days)||4;meatDays=Number(d.meatDays??1);excluded=d.excluded||{};plan=(d.plan||[]).filter(x=>recipes.some(r=>r.id===x));pendingShopping=Array.isArray(d.shopping)?d.shopping.map(i=>({id:id(),name:cleanName(i.name),category:String(i.category||'andet'),qty:Number(i.qty)||1,on:i.on!==false,source:i.source||'delt'})).filter(i=>i.name):null}";
    var oldState="function stateObj(){let chosen=plan.map(byId).filter(Boolean).map(r=>({id:r.id,name:r.name,type:r.type,ingredients:r.ingredients}));return {v:2,days,meatDays,plan,excluded,recipes:chosen,shopping:minShopping(shopping)}}";
    var newState="function stateObj(){let chosen=plan.map(byId).filter(Boolean).map(r=>[r.id,r.name,r.type,(r.ingredients||[]).map(i=>[i.name,Math.max(0,CATS.indexOf(i.category||'andet'))])]);return {v:3,d:days,m:meatDays,p:plan,x:excluded,r:chosen}}";
    var oldShare="async function shareWeek(){saveSession();let link=location.origin+location.pathname+'#uge='+enc(stateObj());try{if(navigator.share){await navigator.share({title:'Madplan',text:'Her er ugens madplan',url:link});return}await navigator.clipboard.writeText(link);alert('Del uge-linket er kopieret. Send det til hende.')}catch(e){prompt('Kopiér Del uge-linket:',link)}}";
    var newShare="async function shareWeek(){saveSession();let link=location.origin+location.pathname+'#uge='+enc(stateObj());let msg='Her er ugens madplan:\\n'+link;try{if(navigator.share){await navigator.share({title:'Madplan',text:msg,url:link});return}await navigator.clipboard.writeText(msg);alert('Del uge-linket er kopieret. Send det til hende.')}catch(e){prompt('Kopiér Del uge-linket:',msg)}}";
    html=html.replace(oldApply,newApply).replace(oldState,newState).replace(oldShare,newShare);
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML='<div class="card"><h1>Madplan kunne ikke åbnes</h1><p>Prøv at genindlæse siden.</p><p class="muted">Fejl: '+String(e.message||e)+'</p></div>';
  }
})();
</script>
</body>
</html>
