name: Patch madplan PDF columns

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-madplan-pdf-columns.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch PDF columns
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p = Path('madplan/index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace(
            '.printbox h1{font-size:28px;color:var(--accent);margin-bottom:14px}.printbox h3{font-size:17px;color:var(--accent);margin-top:18px;margin-bottom:8px}.printbox ul{margin:0 0 0 20px;padding:0}.printbox p,.printbox li{font-size:16px;line-height:1.45}.printbox li{margin:4px 0}',
            '.printbox h1{font-size:30px;color:var(--accent);margin-bottom:14px}.printbox h3{font-size:18px;color:var(--accent);margin-top:14px;margin-bottom:8px}.printbox ul{margin:0 0 0 20px;padding:0}.printbox p,.printbox li{font-size:17px;line-height:1.45}.printbox li{margin:4px 0}.shopping-cols{column-count:2;column-gap:30px}.shopping-group{break-inside:avoid;margin-bottom:8px}@media(max-width:520px){.shopping-cols{column-count:1}}'
          )
          s = s.replace(
            "<h1 style=\"margin-top:20px\">Indkøbslisten</h1>${CATS.map(c=>groups[c]?.length?`<h3>${cap(c)}</h3><ul>${groups[c].map(i=>`<li>${esc(i.name)} (${i.qty})</li>`).join('')}</ul>`:'').join('')}</div>`}",
            "<h1 style=\"margin-top:20px\">Indkøbslisten</h1><div class=\"shopping-cols\">${CATS.map(c=>groups[c]?.length?`<div class=\"shopping-group\"><h3>${cap(c)}</h3><ul>${groups[c].map(i=>`<li>${esc(i.name)} (${i.qty})</li>`).join('')}</ul></div>`:'').join('')}</div></div>`}"
          )
          new_make_pdf = r'''function makePdfBlob(){
let pages=[],cur=[];
function pushPage(){if(cur.length){pages.push(cur);cur=[]}}
function addText(t,s,b,x,y){cur.push({t:String(t||''),s:s||12,b:!!b,x:x,y:y})}
let y=790;
function addFull(t,s,b,g=0){let max=s>=24?38:s>=17?54:66;for(let part of wrapText(t,max)){if(y<60){pushPage();y=790}addText(part,s,b,56,y);y-=s+8}y-=g}
addFull('Ugens madplan',27,true,8);
plan.forEach((rid,i)=>addFull(`Dag ${i+1}: ${cap(byId(rid).name)}`,17,false,1));
y-=10;
addFull('Indkøbslisten',27,true,8);
let xs=[56,310],ys=[y,y],col=0;
function nextColumn(){if(col===0){col=1}else{pushPage();col=0;ys=[790,790]}}
function addCol(t,s,b,g=0){let max=s>=18?27:31;for(let part of wrapText(t,max)){if(ys[col]<55)nextColumn();addText(part,s,b,xs[col],ys[col]);ys[col]-=s+7}ys[col]-=g}
let g=groupedItems();
CATS.forEach(c=>{if(g[c]?.length){if(ys[col]<95)nextColumn();addCol(cap(c),19,true,3);g[c].forEach(i=>addCol(`- ${i.name} (${i.qty})`,16,false,0));ys[col]-=8}});
pushPage();
let n=pages.length,font1=3+n*2,font2=font1+1,objs=[];
objs[1]='<< /Type /Catalog /Pages 2 0 R >>';
objs[2]=`<< /Type /Pages /Kids [${pages.map((_,i)=>`${3+i*2} 0 R`).join(' ')}] /Count ${n} >>`;
pages.forEach((p,i)=>{let po=3+i*2,co=po+1;let stream=p.map(x=>`BT /F${x.b?2:1} ${x.s} Tf ${x.x} ${x.y} Td <${ansiHex(x.t)}> Tj ET\n`).join('');objs[po]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ${font1} 0 R /F2 ${font2} 0 R >> >> /Contents ${co} 0 R >>`;objs[co]=`<< /Length ${stream.length} >>\nstream\n${stream}endstream`});
objs[font1]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';
objs[font2]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>';
let pdf='%PDF-1.4\n',offs=[0];for(let i=1;i<objs.length;i++){offs[i]=pdf.length;pdf+=`${i} 0 obj\n${objs[i]}\nendobj\n`}let xref=pdf.length;pdf+=`xref\n0 ${objs.length}\n0000000000 65535 f \n`;for(let i=1;i<objs.length;i++)pdf+=String(offs[i]).padStart(10,'0')+' 00000 n \n';pdf+=`trailer\n<< /Size ${objs.length} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;return new Blob([pdf],{type:'application/pdf'})}'''
          s = re.sub(r"function makePdfBlob\(\).*?\nfunction downloadPdf", new_make_pdf + "\nfunction downloadPdf", s, count=1, flags=re.S)
          Path('.github/workflows/patch-madplan-pdf-columns.yml').unlink()
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add madplan/index.html .github/workflows/patch-madplan-pdf-columns.yml
          git commit -m "Gør PDF tospaltet og større"
          git push

# rerun
