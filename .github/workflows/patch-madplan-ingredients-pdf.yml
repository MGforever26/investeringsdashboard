name: Patch madplan ingredients and PDF

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-madplan-ingredients-pdf.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch madplan app
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p = Path('madplan/index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('padding:calc(14px + var(--safe-top)) 16px 10px', 'padding:calc(18px + var(--safe-top)) 16px 12px')
          s = s.replace('.brand{display:flex;gap:12px;align-items:center;margin-bottom:13px}.mark{width:44px;height:44px;border-radius:16px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:900;font-size:18px}.brand b{display:block;font-size:22px;letter-spacing:-.04em;line-height:1}.brand small{display:block;color:var(--muted);font-size:12px;margin-top:3px}', '.brand{display:flex;gap:13px;align-items:center;margin-bottom:14px}.mark{width:48px;height:48px;border-radius:17px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:900;font-size:20px}.brand b{display:block;font-size:30px;letter-spacing:-.06em;line-height:.95}.brand small{display:block;color:var(--muted);font-size:12px;margin-top:5px}')
          s = s.replace('.printbox h1{font-size:24px;color:var(--accent);margin-bottom:14px}.printbox h3{font-size:14px;color:var(--accent);margin-top:16px;margin-bottom:6px}.printbox ul{margin:0 0 0 18px;padding:0}.printbox li{margin:3px 0}', '.printbox h1{font-size:28px;color:var(--accent);margin-bottom:14px}.printbox h3{font-size:17px;color:var(--accent);margin-top:18px;margin-bottom:8px}.printbox ul{margin:0 0 0 20px;padding:0}.printbox p,.printbox li{font-size:16px;line-height:1.45}.printbox li{margin:4px 0}')
          s = s.replace('<div class="card"><div class="hero-kicker">Ugens overblik</div><h1 class="hero-title">Madplan</h1><p class="sub">', '<div class="card"><h2>Ugens madplan</h2><p class="sub">')
          s = s.replace('let recipes=[],plan=[],shopping=[],days=4,meatDays=1;', 'let recipes=[],plan=[],shopping=[],days=4,meatDays=1,excluded={};')
          s = s.replace('plan=s.plan||[]', 'plan=s.plan||[];excluded=s.excluded||{}')
          s = s.replace('JSON.stringify({days,meatDays,plan})', 'JSON.stringify({days,meatDays,plan,excluded})')
          s = s.replace('plan=shuffle(pick).slice(0,days).map(r=>r.id);saveSession()', 'plan=shuffle(pick).slice(0,days).map(r=>r.id);excluded={};saveSession()')
          s = s.replace("function buildShopping(){let m={};function add(name,cat,qty=1,source='ret'){cat=cat||'andet';let key=cat+'|'+name.toLowerCase();if(!m[key])m[key]={id:id(),name,category:cat,qty:0,on:true,source};m[key].qty+=qty}plan.map(byId).forEach(r=>(r.ingredients||[]).forEach(i=>add(i.name,i.category,1,'ret')));STANDARD.forEach(i=>add(i.name,i.category,i.qty,'standard'));shopping=Object.values(m).sort((a,b)=>CATS.indexOf(a.category)-CATS.indexOf(b.category)||a.name.localeCompare(b.name,'da'))}", "function ingredientKey(day,i){return day+'|'+(i.name||'').toLowerCase()+'|'+(i.category||'andet')}\nfunction ingOn(day,i){return !excluded[ingredientKey(day,i)]}\nfunction toggleIng(day,idx){let r=byId(plan[day]),i=(r.ingredients||[])[idx];if(!i)return;let k=ingredientKey(day,i);if(excluded[k])delete excluded[k];else excluded[k]=true;buildShopping();saveSession();renderAll()}\nfunction buildShopping(){let m={};function add(name,cat,qty=1,source='ret'){cat=cat||'andet';let key=cat+'|'+name.toLowerCase();if(!m[key])m[key]={id:id(),name,category:cat,qty:0,on:true,source};m[key].qty+=qty}plan.map(byId).forEach((r,di)=>(r.ingredients||[]).forEach(i=>{if(ingOn(di,i))add(i.name,i.category,1,'ret')}));STANDARD.forEach(i=>add(i.name,i.category,i.qty,'standard'));shopping=Object.values(m).sort((a,b)=>CATS.indexOf(a.category)-CATS.indexOf(b.category)||a.name.localeCompare(b.name,'da'))}")
          s = re.sub(r"function dayCard\(i,rid\).*?\nfunction renderList", "function dayCard(i,rid){let r=byId(rid);return `<div class=\"card day\"><div class=\"bubble\">${i+1}</div><div><div class=\"row\" style=\"justify-content:space-between\"><h3>Dag ${i+1}</h3><span class=\"pill\">${esc(r.type)}</span></div><select data-day=\"${i}\" style=\"margin:10px 0\">${recipes.map(x=>`<option value=\"${x.id}\" ${x.id===rid?'selected':''}>${esc(cap(x.name))}</option>`).join('')}</select><details><summary class=\"sub\">Ingredienser (${r.ingredients.filter(x=>ingOn(i,x)).length}/${r.ingredients.length} valgt)</summary><div style=\"margin-top:8px\">${r.ingredients.map((x,idx)=>`<div class=\"item\" style=\"grid-template-columns:32px 1fr\"><button class=\"check ${ingOn(i,x)?'on':''}\" onclick=\"toggleIng(${i},${idx})\">${ingOn(i,x)?'✓':''}</button><div><b>${esc(x.name)}</b><div class=\"sub\" style=\"margin:2px 0 0\">${esc(x.category)}</div></div></div>`).join('')}</div></details></div></div>`}\nfunction renderList", s, count=1, flags=re.S)
          s = s.replace("function pdfRows(){let rows=[{t:'Ugens madplan',s:20,b:1,g:6}];plan.forEach((rid,i)=>rows.push({t:`Dag ${i+1}: ${cap(byId(rid).name)}`,s:12}));rows.push({t:'',s:12,g:5},{t:'Indkøbslisten',s:20,b:1,g:6});let g=groupedItems();CATS.forEach(c=>{if(g[c]?.length){rows.push({t:cap(c),s:14,b:1,g:2});g[c].forEach(i=>rows.push({t:`- ${i.name} (${i.qty})`,s:12}));rows.push({t:'',s:12,g:4})}});return rows}", "function pdfRows(){let rows=[{t:'Ugens madplan',s:24,b:1,g:8}];plan.forEach((rid,i)=>rows.push({t:`Dag ${i+1}: ${cap(byId(rid).name)}`,s:15}));rows.push({t:'',s:12,g:6},{t:'Indkøbslisten',s:24,b:1,g:8});let g=groupedItems();CATS.forEach(c=>{if(g[c]?.length){rows.push({t:cap(c),s:17,b:1,g:3});g[c].forEach(i=>rows.push({t:`- ${i.name} (${i.qty})`,s:15}));rows.push({t:'',s:12,g:5})}});return rows}")
          Path('.github/workflows/patch-madplan-ingredients-pdf.yml').unlink()
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add madplan/index.html .github/workflows/patch-madplan-ingredients-pdf.yml
          git commit -m "Juster titel pdf og ingrediensvalg"
          git push
