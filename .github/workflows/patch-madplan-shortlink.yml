name: Patch madplan shortlink

on:
  push:
    branches: [main]
    paths:
      - .github/triggers/madplan-shortlink.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch shortlink
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p = Path('madplan/index.html')
          s = p.read_text(encoding='utf-8')
          repl = """async function shortShareUrl(longLink){let services=['https://tinyurl.com/api-create.php?url='+encodeURIComponent(longLink),'https://is.gd/create.php?format=simple&url='+encodeURIComponent(longLink)];for(let u of services){try{let r=await fetch(u);let t=(await r.text()).trim();if(r.ok&&/^https?:\\/\\//.test(t)&&t.length<longLink.length)return t}catch(e){}}return longLink}\nasync function shareWeek(){saveSession();let chosen=plan.map(byId).filter(Boolean).map(r=>({id:r.id,name:r.name,type:r.type,ingredients:r.ingredients}));let payload={v:1,days,meatDays,plan,excluded,recipes:chosen,shopping:minShopping(shopping)};let longLink=location.origin+location.pathname+'#uge='+enc(payload);let link=await shortShareUrl(longLink);let msg=link===longLink?'Del uge-linket er kopieret. Kortlink-tjenesten svarede ikke, så linket er stadig langt.':'Kort Del uge-link er kopieret. Send det til hende.';if(navigator.share&&link!==longLink){try{await navigator.share({title:'Madplan',text:'Her er ugens madplan',url:link});return}catch(e){}}try{await navigator.clipboard.writeText(link);alert(msg)}catch(e){prompt('Kopiér del uge-linket:',link)}}\nfunction setTab"""
          s = re.sub(r"async function shareWeek\(\).*?\nfunction setTab", repl, s, count=1, flags=re.S)
          for q in ['.github/workflows/patch-madplan-shortlink.yml','.github/workflows/patch-madplan-share-week.yml','.github/triggers/madplan-shortlink.txt']:
              qq = Path(q)
              if qq.exists(): qq.unlink()
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add madplan/index.html .github/workflows/patch-madplan-shortlink.yml .github/workflows/patch-madplan-share-week.yml .github/triggers/madplan-shortlink.txt
          git commit -m "Gør Del uge link kort"
          git push
