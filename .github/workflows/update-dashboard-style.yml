name: Update dashboard style

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-dashboard-style.yml

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply dashboard adjustments
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace('<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">', '<meta name="apple-mobile-web-app-status-bar-style" content="default">')
          s = s.replace('<meta name="theme-color" content="#07070f">', '<meta name="theme-color" content="#f8fafc">')

          s = re.sub(r"  :root \{.*?--safe-bottom:env\(safe-area-inset-bottom,0px\);\n  \}", """  :root {
            --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;
            --border:#e2e8f0;--text:#0f172a;--muted:#64748b;--dim:#94a3b8;
            --indigo:#4f46e5;--indigo-soft:rgba(79,70,229,0.10);
            --blue:#2563eb;--cyan:#0891b2;--purple:#7c3aed;--amber:#d97706;
            --green:#059669;--red:#dc2626;--orange:#ea580c;
            --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
          }""", s, flags=re.S)

          replacements = {
            "#upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:32px}":
            "#upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(52px + var(--safe-top)) 24px calc(32px + var(--safe-bottom));gap:32px}",
            ".logo-mark{width:64px;height:64px;background:linear-gradient(135deg,var(--indigo),var(--purple));border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;box-shadow:0 0 40px rgba(99,102,241,0.4)}":
            ".logo-mark{width:64px;height:64px;background:linear-gradient(135deg,var(--indigo),var(--purple));color:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;box-shadow:0 16px 34px rgba(79,70,229,0.22)}",
            ".drop-zone{width:100%;max-width:380px;border:2px dashed rgba(99,102,241,0.4);border-radius:20px;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;cursor:pointer;transition:all 0.2s;background:var(--indigo-soft);position:relative}":
            ".drop-zone{width:100%;max-width:380px;border:2px dashed rgba(79,70,229,0.35);border-radius:20px;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;cursor:pointer;transition:all 0.2s;background:#fff;box-shadow:0 18px 40px rgba(15,23,42,0.08);position:relative}",
            ".drop-zone.drag-over{border-color:var(--indigo);background:rgba(99,102,241,0.2);transform:scale(1.02)}":
            ".drop-zone.drag-over{border-color:var(--indigo);background:var(--indigo-soft);transform:scale(1.02)}",
            ".header{position:sticky;top:0;z-index:100;background:rgba(7,7,15,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 16px 0}":
            ".header{position:sticky;top:0;z-index:100;background:rgba(248,250,252,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:calc(18px + var(--safe-top)) 16px 0;box-shadow:0 8px 24px rgba(15,23,42,0.05)}",
            ".header-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--indigo),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800}":
            ".header-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--indigo),var(--purple));color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800}",
            ".tab-btn.active{color:#818cf8;border-bottom-color:var(--indigo);background:rgba(99,102,241,0.08)}":
            ".tab-btn.active{color:var(--indigo);border-bottom-color:var(--indigo);background:var(--indigo-soft)}",
            ".seg-filter{display:flex;gap:6px;margin-bottom:14px;padding:4px;background:rgba(255,255,255,0.04);border-radius:12px}":
            ".seg-filter{display:flex;gap:6px;margin-bottom:14px;padding:4px;background:var(--surface2);border-radius:12px;border:1px solid var(--border)}",
            ".seg-btn.active{background:var(--indigo);color:#fff;box-shadow:0 0 12px rgba(99,102,241,0.4)}":
            ".seg-btn.active{background:var(--indigo);color:#fff;box-shadow:0 8px 18px rgba(79,70,229,0.22)}",
            ".seg-btn.active.pension{background:var(--purple);box-shadow:0 0 12px rgba(167,139,250,0.4)}":
            ".seg-btn.active.pension{background:var(--purple);box-shadow:0 8px 18px rgba(124,58,237,0.20)}",
            ".seg-btn.active.fri{background:var(--blue);box-shadow:0 0 12px rgba(59,130,246,0.4)}":
            ".seg-btn.active.fri{background:var(--blue);box-shadow:0 8px 18px rgba(37,99,235,0.20)}",
            ".card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}":
            ".card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 10px 28px rgba(15,23,42,0.04)}",
            ".badge{font-size:10px;background:var(--indigo-soft);color:#818cf8;padding:2px 8px;border-radius:20px;margin-left:auto}":
            ".badge{font-size:10px;background:var(--indigo-soft);color:var(--indigo);padding:2px 8px;border-radius:20px;margin-left:auto}",
            ".kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px 12px;position:relative;overflow:hidden}":
            ".kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px 12px;position:relative;overflow:hidden;box-shadow:0 10px 24px rgba(15,23,42,0.04)}",
            ".ai-bar-track{height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden;display:flex}":
            ".ai-bar-track{height:10px;background:rgba(15,23,42,0.08);border-radius:5px;overflow:hidden;display:flex}",
            ".tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);background:rgba(99,102,241,0.04);white-space:nowrap}":
            ".tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}",
            ".tbl td{font-size:11px;padding:9px 8px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}":
            ".tbl td{font-size:11px;padding:9px 8px;border-bottom:1px solid rgba(15,23,42,0.06);vertical-align:middle}",
            ".rank{width:22px;height:22px;border-radius:6px;background:var(--indigo-soft);color:#818cf8;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}":
            ".rank{width:22px;height:22px;border-radius:6px;background:var(--indigo-soft);color:var(--indigo);font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}",
            ".progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:6px}":
            ".progress-bar{height:6px;background:rgba(15,23,42,0.08);border-radius:3px;overflow:hidden;margin-top:6px}",
            ".skat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05)}":
            ".skat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid rgba(15,23,42,0.06)}",
            ".skat-label{font-size:11px;color:#94a3b8}":
            ".skat-label{font-size:11px;color:#475569}",
            ".chip{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);color:#818cf8;font-size:10px;font-weight:600;padding:7px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s;font-family:inherit}":
            ".chip{background:var(--indigo-soft);border:1px solid rgba(79,70,229,0.18);color:var(--indigo);font-size:10px;font-weight:600;padding:7px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s;font-family:inherit}",
            ".chip:hover{background:rgba(99,102,241,0.2)}":
            ".chip:hover{background:rgba(79,70,229,0.16)}",
            ".bench-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}":
            ".bench-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(15,23,42,0.06)}",
            ".bench-name{font-size:11px;color:#94a3b8}":
            ".bench-name{font-size:11px;color:#475569}",
          }
          for old, new in replacements.items():
              s = s.replace(old, new)

          # Fjern synlig datakontrolboks, men behold intern kontrolkode til senere brug.
          s = re.sub(r"\n  if \(DATA\.dataWarnings && DATA\.dataWarnings\.length\) \{\n    el\.innerHTML \+= `[^`]*Datakontrol:[\s\S]*?\n  \}\n", "\n", s)

          # Få enkelte inline elementer til at passe bedre til lys baggrund.
          s = s.replace('border-bottom:1px solid rgba(255,255,255,0.04)', 'border-bottom:1px solid rgba(15,23,42,0.06)')
          s = s.replace('background:rgba(255,255,255,0.06);padding', 'background:var(--surface2);padding')

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No index changes to commit"
          else
            git commit -m "Opdater dashboard layout"
            git push
          fi
